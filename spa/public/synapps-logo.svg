<circle cx="55" cy="-25" r="3.5" fill="var(--syn-light)" opacity="0.55"/>
<circle cx="130" cy="50" r="3" fill="var(--syn-light)" opacity="0.5"/>
<circle cx="125" cy="90" r="3.5" fill="var(--syn-light)" opacity="0.55"/>
<circle cx="90" cy="130" r="3" fill="var(--syn-light)" opacity="0.5"/>
<circle cx="-60" cy="155" r="3.5" fill="var(--syn-light)" opacity="0.55"/>
<circle cx="15" cy="158" r="3" fill="var(--syn-light)" opacity="0.5"/>

<!-- Spine nodes -->
<circle cx="20" cy="-130" r="7" fill="var(--syn)"/>
<circle cx="-50" cy="-110" r="6" fill="var(--syn)"/>
<circle cx="-80" cy="-70" r="7" fill="var(--syn)"/>
<circle cx="-40" cy="-30" r="6" fill="var(--syn)"/>
<circle cx="10" cy="-5" r="7.5" fill="var(--syn)"/>
