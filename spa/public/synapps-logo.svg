<line x1="-20" y1="125" x2="15" y2="158" stroke="var(--syn-light)" stroke-width="1.2" stroke-linecap="round"/>

<!-- Dendrite terminal dots -->
<circle cx="65" cy="-155" r="3.5" fill="var(--syn-light)" opacity="0.55"/>
<circle cx="-15" cy="-160" r="3" fill="var(--syn-light)" opacity="0.5"/>
<circle cx="-90" cy="-140" r="3" fill="var(--syn-light)" opacity="0.5"/>
<circle cx="-130" cy="-85" r="3.5" fill="var(--syn-light)" opacity="0.55"/>
<circle cx="-125" cy="-45" r="3" fill="var(--syn-light)" opacity="0.5"/>
