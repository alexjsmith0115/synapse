<svg width="680" height="520" viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg">
<style>
:root { --syn: #2D6A4F; --syn-light: #74C69D; }
@media (prefers-color-scheme: dark) {
  :root { --syn: #74C69D; --syn-light: #2D6A4F; }
}
</style>

<g transform="translate(340, 220)">

<!-- Spine connections -->
<line x1="20" y1="-130" x2="-50" y2="-110" stroke="var(--syn)" stroke-width="2" stroke-linecap="round"/>
<line x1="-50" y1="-110" x2="-80" y2="-70" stroke="var(--syn)" stroke-width="2" stroke-linecap="round"/>
<line x1="-80" y1="-70" x2="-40" y2="-30" stroke="var(--syn)" stroke-width="2" stroke-linecap="round"/>
