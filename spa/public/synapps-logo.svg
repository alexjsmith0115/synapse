<line x1="10" y1="-5" x2="50" y2="25" stroke="var(--syn)" stroke-width="2" stroke-linecap="round"/>
<line x1="50" y1="25" x2="80" y2="65" stroke="var(--syn)" stroke-width="2" stroke-linecap="round"/>
<line x1="80" y1="65" x2="50" y2="105" stroke="var(--syn)" stroke-width="2" stroke-linecap="round"/>
<line x1="50" y1="105" x2="-20" y2="125" stroke="var(--syn)" stroke-width="2" stroke-linecap="round"/>

<!-- Dendrite branches -->
<line x1="20" y1="-130" x2="65" y2="-155" stroke="var(--syn-light)" stroke-width="1.2" stroke-linecap="round"/>
