<line x1="-80" y1="-70" x2="-130" y2="-85" stroke="var(--syn-light)" stroke-width="1.2" stroke-linecap="round"/>
<line x1="-80" y1="-70" x2="-125" y2="-45" stroke="var(--syn-light)" stroke-width="1.2" stroke-linecap="round"/>
<line x1="10" y1="-5" x2="-40" y2="5" stroke="var(--syn-light)" stroke-width="1.2" stroke-linecap="round"/>
<line x1="10" y1="-5" x2="55" y2="-25" stroke="var(--syn-light)" stroke-width="1.2" stroke-linecap="round"/>
<line x1="80" y1="65" x2="130" y2="50" stroke="var(--syn-light)" stroke-width="1.2" stroke-linecap="round"/>
