name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build and smoke-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build SPA
        run: bash scripts/build_spa.sh

      - name: Build wheel and sdist
        run: uv build

      - name: Smoke test
        run: |
          python3 -m venv /tmp/smoke-venv
          /tmp/smoke-venv/bin/python -m pip install --quiet dist/*.whl
          /tmp/smoke-venv/bin/python -c "
          import synapps
          import solidlsp
          import tree_sitter_python
          import tree_sitter_c_sharp
          import tree_sitter_typescript
          import tree_sitter_java
          print(f'synapps.__version__ = {synapps.__version__!r}')
          assert synapps.__version__ != 'dev', 'version must not be dev in wheel'
          print('All imports OK')

          from pathlib import Path
          import synapps.web.app as wa
          spa = Path(wa.__file__).parent / 'static' / 'index.html'
          assert spa.exists(), f'SPA index.html missing from wheel at {spa}'
          print('SPA assets OK')
          "
          /tmp/smoke-venv/bin/synapps --help
          /tmp/smoke-venv/bin/synapps-mcp --help

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/synapps-mcp/
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - uses: astral-sh/setup-uv@v7

      - name: Publish to PyPI
        run: uv publish --trusted-publishing always
