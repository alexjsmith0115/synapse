name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run unit tests
        run: pytest tests/unit/ -v

  integration:
    runs-on: ubuntu-latest
    services:
      memgraph:
        image: memgraph/memgraph
        ports:
          - 7687:7687
        options: >-
          --health-cmd "echo 'RETURN 1;' | mgconsole || exit 1"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run C# integration tests
        run: |
          pytest tests/integration/test_mcp_tools.py -v -m integration
          pytest tests/integration/test_cli_commands.py -v -m integration

      - name: Run Python integration tests
        run: |
          pytest tests/integration/test_mcp_tools_python.py -v -m integration
          pytest tests/integration/test_cli_commands_python.py -v -m integration

      - name: Run TypeScript integration tests
        run: |
          pytest tests/integration/test_mcp_tools_typescript.py -v -m integration
          pytest tests/integration/test_cli_commands_typescript.py -v -m integration

      - name: Run Java integration tests
        run: |
          pytest tests/integration/test_mcp_tools_java.py -v -m integration
          pytest tests/integration/test_cli_commands_java.py -v -m integration
